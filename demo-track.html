<!DOCTYPE html>
<html>

<head>

<title>Tracking Page</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-K9YEHH7NHQ"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-K9YEHH7NHQ');
</script>

</head>

<body>

<h2>Tracking Click...</h2>

<script>

function getParam(name){
const url = new URL(window.location.href);
return url.searchParams.get(name);
}

const leadid = getParam("leadid");
const campaign = getParam("utm_campaign");
const step = getParam("utm_content");

if(leadid){

localStorage.setItem("leadid", leadid);
localStorage.setItem("campaign", campaign);
localStorage.setItem("step", step);

/* Send event */
window.dataLayer.push({
event: "demo_link_clicked",
leadid: leadid,
campaign: campaign,
step: step
});

gtag('event','demo_link_clicked',{
leadid: leadid,
campaign: campaign,
step: step
});

}

/* Redirect after tracking */

setTimeout(function(){
window.location.href="booking.html";
},2000);

</script>

</body>

</html>
